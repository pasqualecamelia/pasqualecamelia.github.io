<svg width="680" height="600" viewBox="0 0 680 600" xmlns="http://www.w3.org/2000/svg" style="background:white">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- outer frame: M5 domain -->
<rect x="160" y="40" width="300" height="510" rx="24" fill="none" stroke="#aaa" stroke-width="1" opacity="0.5"/>

<!-- label top: S1_chi -->
<text x="310" y="28" text-anchor="middle" font-size="11" fill="#888" font-family="serif" font-style="italic">S¹_χ(τ) — loop in the bulk, no preferred direction</text>

<!-- ENTROPY zone top -->
<rect x="164" y="50" width="292" height="60" rx="12" fill="#f5f5f2" stroke="#ccc" stroke-width="0.8"/>
<text x="310" y="76" text-anchor="middle" font-size="13" font-weight="bold" fill="#555" font-family="serif">Entropy</text>
<text x="310" y="96" text-anchor="middle" font-size="10" fill="#888" font-family="serif">θ → π⁻  ·  t → +∞</text>

<!-- R4_eff box (dashed, amber) -->
<rect x="164" y="122" width="292" height="42" rx="8" fill="#fff8ee" stroke="#c8841a" stroke-width="0.9" stroke-dasharray="5 3"/>
<text x="310" y="141" text-anchor="middle" font-size="13" font-weight="bold" fill="#c8841a" font-family="serif">ℝ⁴_eff</text>
<text x="310" y="157" text-anchor="middle" font-size="10" fill="#c8841a" font-family="serif">emerges from coherent gluing of many cells</text>

<!-- Pi arrow -->
<line x1="310" y1="218" x2="310" y2="168" stroke="#c8841a" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="322" y="198" font-size="11" fill="#c8841a" font-family="serif" font-style="italic">Π</text>

<!-- observable slab fill -->
<rect x="164" y="218" width="292" height="136" rx="0" fill="#e8f4ee" opacity="0.5"/>

<!-- DW1 band (dark green) -->
<rect x="164" y="218" width="292" height="38" rx="0" fill="#1a6b4a" opacity="0.18"/>
<line x1="180" y1="237" x2="450" y2="237" stroke="#1a6b4a" stroke-width="2.2"/>
<!-- DW1 leader -->
<line x1="454" y1="237" x2="488" y2="237" stroke="#1a6b4a" stroke-width="0.7"/>
<!-- DW1 labels right -->
<text x="492" y="228" font-size="13" font-weight="bold" fill="#1a6b4a" font-family="serif">DW₁</text>
<text x="492" y="245" font-size="10" fill="#1a6b4a" font-family="serif">θ = π/2  ·  t = 0</text>
<text x="492" y="260" font-size="10" fill="#1a6b4a" font-family="serif">Cayley fixed point  ·  n = 2</text>
<text x="492" y="275" font-size="10" fill="#1a6b4a" font-family="serif">the present</text>
<!-- Psi_bdy label ON DW1 band -->
<text x="260" y="232" font-size="10" fill="#1a6b4a" font-family="serif" font-style="italic">Ψ_bdy = φ sech(Γ_τ t)</text>

<!-- DW2 line (blue dashed) -->
<line x1="180" y1="354" x2="450" y2="354" stroke="#2a6cb0" stroke-width="1.2" stroke-dasharray="6 4"/>
<!-- DW2 leader -->
<line x1="454" y1="354" x2="488" y2="354" stroke="#2a6cb0" stroke-width="0.7"/>
<!-- DW2 labels right -->
<text x="492" y="346" font-size="13" font-weight="bold" fill="#2a6cb0" font-family="serif">DW₂</text>
<text x="492" y="363" font-size="10" fill="#2a6cb0" font-family="serif">θ = π/11  ·  t &gt; 0</text>
<text x="492" y="378" font-size="10" fill="#2a6cb0" font-family="serif">far boundary of slab</text>
<text x="492" y="393" font-size="10" fill="#2a6cb0" font-family="serif">n = 11 enters ker Π</text>

<!-- ker Pi ellipse -->
<ellipse cx="310" cy="432" rx="80" ry="28" fill="#f0eeff" stroke="#7060cc" stroke-width="1.3" stroke-dasharray="5 3"/>
<text x="310" y="428" text-anchor="middle" font-size="11" fill="#7060cc" font-family="serif" font-style="italic">ker Π</text>
<text x="310" y="445" text-anchor="middle" font-size="10" fill="#7060cc" font-family="serif">unobservable memory</text>
<!-- Xi_ker label above ellipse -->
<text x="310" y="398" text-anchor="middle" font-size="10" fill="#7060cc" font-family="serif" font-style="italic">Ξ_ker = −iφ tanh(Γ_τ t)</text>

<!-- BULK zone bottom -->
<rect x="164" y="478" width="292" height="62" rx="12" fill="#f5f5f2" stroke="#ccc" stroke-width="0.8"/>
<text x="310" y="503" text-anchor="middle" font-size="13" font-weight="bold" fill="#555" font-family="serif">Bulk</text>
<text x="310" y="521" text-anchor="middle" font-size="10" fill="#888" font-family="serif">θ → 0⁺  ·  t → −∞  ·  ker Π grows</text>

<!-- time arrow left -->
<line x1="136" y1="472" x2="136" y2="92" stroke="#999" stroke-width="1.2" marker-end="url(#arrow)"/>
<text x="128" y="285" text-anchor="middle" font-size="11" fill="#aaa" font-family="serif" font-style="italic">t</text>

<!-- three readings left -->
<text x="52" y="228" text-anchor="middle" font-size="9" fill="#aaa" font-family="serif">sech²+tanh²=1</text>
<text x="52" y="242" text-anchor="middle" font-size="9" fill="#aaa" font-family="serif">three readings</text>
<text x="52" y="256" text-anchor="middle" font-size="9" fill="#aaa" font-family="serif">of one rotation</text>

<!-- observable slab label left -->
<text x="92" y="294" text-anchor="middle" font-size="9" fill="#aaa" font-family="serif">observable</text>
<text x="92" y="308" text-anchor="middle" font-size="9" fill="#aaa" font-family="serif">slab</text>
<line x1="112" y1="295" x2="162" y2="295" stroke="#ccc" stroke-width="0.5" stroke-dasharray="3 3"/>

<!-- Cayley map left -->
<text x="100" y="370" text-anchor="middle" font-size="9" fill="#aaa" font-family="serif">t(θ) = log tan(θ/2)</text>

<!-- bottom note -->
<text x="310" y="572" text-anchor="middle" font-size="9" fill="#aaa" font-family="serif">ℳ⁵ = 𝒳_bdy × S¹_χ(τ)  ·  pre-geometric domain  ·  S¹_χ is not a fifth spacetime dimension</text>
</svg>
